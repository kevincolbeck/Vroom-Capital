# Legion Bot — nginx config
# Serves the React admin UI and proxies API/WebSocket to FastAPI

# Rate limiting — prevents API abuse
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

server {
    listen 80;
    server_name _;   # replaced with your domain by setup.sh if you set one

    # ── React Admin UI ──────────────────────────────────
    root /home/legion/aiagent/frontend/dist;
    index index.html;

    # Serve static files, fall back to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── FastAPI REST endpoints ───────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
    }

    # ── WebSocket — real-time dashboard updates ──────────
    location /ws {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;

        # WebSocket connections stay open — no timeout
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── Backtest endpoints (longer timeout for data download) ──
    location /backtest/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
    }

    # ── Security headers ─────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy       "strict-origin" always;

    # Block common attack paths
    location ~ /\. { deny all; }
    location = /robots.txt { return 200 "User-agent: *\nDisallow: /\n"; }
}
